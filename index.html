<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osama Mokhtar — Linko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #050505;
    --charcoal: #0e0e0e;
    --card: #141414;
    --border: rgba(255,255,255,0.07);
    --green: #b5f000;
    --green-glow: rgba(181,240,0,0.35);
    --green-dim: rgba(181,240,0,0.12);
    --white: #f5f5f5;
    --muted: rgba(245,245,245,0.45);
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 180px;
    pointer-events: none;
    opacity: 0.4;
  }

  /* ─── AMBIENT GLOW ─── */
  .ambient {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(181,240,0,0.08) 0%, transparent 70%);
    top: -200px; left: 50%; transform: translateX(-50%);
    pointer-events: none; z-index: 0;
    animation: pulse 6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.1)} }

  /* ─── WRAPPER ─── */
  .page {
    position: relative; z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 60px;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

  /* ─── HERO ─── */
  .hero {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 72px;
    gap: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s both;
  }

  .avatar-wrap {
    position: relative;
    width: 118px; height: 118px;
    margin-bottom: 22px;
  }
  .avatar-ring {
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--green) 0deg, transparent 120deg, var(--green) 240deg, transparent 360deg);
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .avatar-ring-mask {
    position: absolute; inset: 2px;
    border-radius: 50%;
    background: var(--black);
  }
  .avatar-img {
    position: absolute; inset: 4px;
    border-radius: 50%;
    object-fit: cover; object-position: top;
    width: calc(100% - 8px); height: calc(100% - 8px);
    z-index: 1;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--green-dim);
    border: 1px solid rgba(181,240,0,0.25);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: 11px; font-weight: 500;
    color: var(--green);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .hero-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hero-name {
    font-family: var(--font-display);
    font-size: clamp(28px, 7vw, 36px);
    font-weight: 800;
    letter-spacing: -0.02em;
    text-align: center;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .hero-name span { color: var(--green); }

  .hero-sub {
    font-size: 14px;
    line-height: 1.65;
    color: var(--muted);
    text-align: center;
    max-width: 300px;
    font-weight: 300;
    margin-bottom: 28px;
  }

  /* ─── DIVIDER ─── */
  .divider {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    border-radius: 99px;
    margin: 4px auto 28px;
  }

  /* ─── SOCIAL ROW ─── */
  /* ─── SOCIAL ROW ─── */
  .socials {
    display: flex; gap: 16px;
    justify-content: center;
    align-items: center;
    margin-bottom: 38px;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.4s both;
  }

  .social-btn {
    width: 52px; height: 52px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    text-decoration: none;
    color: var(--white);
    background: var(--card);
    border: 1px solid var(--border);
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1),
                box-shadow 0.3s, border-color 0.3s, color 0.3s, background 0.3s;
    position: relative; overflow: hidden;
  }

  /* Shimmer layer */
  .social-btn::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: inherit;
  }
  /* Icon stays above shimmer */
  .social-btn i { position: relative; z-index: 1; transition: transform 0.3s cubic-bezier(0.22,1,0.36,1); }
  .social-btn:hover i { transform: scale(1.2) rotate(-6deg); }
  .social-btn:hover { transform: translateY(-5px) scale(1.08); }

  /* ── Facebook ── */
  .social-btn.fb::before { background: rgba(24,119,242,0.18); }
  .social-btn.fb:hover { color: #1877f2; border-color: #1877f2; box-shadow: 0 10px 28px rgba(24,119,242,0.4); }
  .social-btn.fb:hover::before { opacity: 1; }

  /* ── LinkedIn ── */
  .social-btn.li::before { background: rgba(10,102,194,0.18); }
  .social-btn.li:hover { color: #0a66c2; border-color: #0a66c2; box-shadow: 0 10px 28px rgba(10,102,194,0.4); }
  .social-btn.li:hover::before { opacity: 1; }

  /* ── TikTok ── */
  .social-btn.tt::before { background: rgba(0,242,234,0.1); }
  .social-btn.tt:hover { color: #fff; border-color: #00f2ea; box-shadow: 0 10px 28px rgba(0,242,234,0.3), 0 0 0 1px rgba(254,44,85,0.4); }
  .social-btn.tt:hover::before { opacity: 1; }
  .social-btn.tt:hover i { filter: drop-shadow(2px 2px 0 rgba(254,44,85,0.7)) drop-shadow(-2px -1px 0 rgba(0,242,234,0.7)); }

  /* ── Instagram ── */
  .social-btn.ig::before {
    background: linear-gradient(135deg, rgba(253,88,73,0.2), rgba(214,36,159,0.2), rgba(88,81,219,0.2));
  }
  .social-btn.ig:hover {
    border-color: transparent;
    color: #fff;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    box-shadow: 0 10px 30px rgba(214,36,159,0.5);
  }
  .social-btn.ig:hover::before { opacity: 0; }

  /* ─── SECTION LABEL ─── */
  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 14px;
    padding-left: 2px;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s both;
  }

  /* ─── ACTION BUTTONS ─── */
  .actions {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.55s both;
  }

  .action-btn {
    display: flex; align-items: center;
    gap: 16px;
    padding: 17px 20px;
    border-radius: 18px;
    text-decoration: none;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--white);
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.28s cubic-bezier(0.22,1,0.36,1), box-shadow 0.28s, border-color 0.28s;
  }
  .action-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .action-btn:hover { transform: translateY(-3px) scale(1.013); }

  .action-icon {
    width: 42px; height: 42px; min-width: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    transition: transform 0.3s;
  }
  .action-btn:hover .action-icon { transform: scale(1.12) rotate(-4deg); }

  .action-text { flex: 1; }
  .action-title { font-size: 15px; font-weight: 700; line-height: 1.2; }
  .action-sub { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 2px; font-family: var(--font-body); }

  .action-arrow {
    font-size: 14px;
    color: var(--muted);
    transition: transform 0.25s, color 0.25s;
  }
  .action-btn:hover .action-arrow { transform: translateX(4px); color: var(--white); }

  /* WhatsApp */
  .btn-whatsapp { border-color: rgba(37,211,102,0.3); }
  .btn-whatsapp:hover { box-shadow: 0 12px 32px rgba(37,211,102,0.25); border-color: #25d366; }
  .btn-whatsapp .action-icon { background: rgba(37,211,102,0.15); color: #25d366; }

  /* Vodafone */
  .btn-vodafone { border-color: rgba(230,0,0,0.25); }
  .btn-vodafone:hover { box-shadow: 0 12px 32px rgba(230,0,0,0.2); border-color: #e60000; }
  .btn-vodafone .action-icon { background: rgba(230,0,0,0.12); color: #e60000; }

  /* Phone */
  .btn-phone { border-color: rgba(181,240,0,0.25); }
  .btn-phone:hover { box-shadow: 0 12px 32px var(--green-glow); border-color: var(--green); }
  .btn-phone .action-icon { background: var(--green-dim); color: var(--green); }

  /* Email */
  .btn-email { border-color: rgba(100,160,255,0.2); }
  .btn-email:hover { box-shadow: 0 12px 32px rgba(100,160,255,0.2); border-color: #64a0ff; }
  .btn-email .action-icon { background: rgba(100,160,255,0.1); color: #64a0ff; }

  /* ─── FOOTER ─── */
  .footer {
    margin-top: 52px;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.7s both;
  }
  .footer-logo {
    width: 100px;
    filter: drop-shadow(0 0 14px var(--green-glow));
    transition: filter 0.3s;
  }
  .footer-logo:hover { filter: drop-shadow(0 0 24px rgba(181,240,0,0.6)); }
  .footer-tag {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .footer-tag span { color: var(--green); }
</style>
</head>

<script>
  // Ripple on button tap
  document.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const r = document.createElement('span');
      const d = Math.max(this.offsetWidth, this.offsetHeight);
      r.style.cssText = `position:absolute;width:${d}px;height:${d}px;border-radius:50%;background:rgba(255,255,255,0.08);transform:scale(0);animation:ripple .5s linear;top:${e.offsetY-d/2}px;left:${e.offsetX-d/2}px;pointer-events:none;`;
      this.appendChild(r);
      setTimeout(() => r.remove(), 600);
    });
  });
  const s = document.createElement('style');
  s.textContent = '@keyframes ripple{to{transform:scale(3);opacity:0}}';
  document.head.appendChild(s);
</script>
